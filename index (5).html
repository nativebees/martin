<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>REPs, My Little Babies</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000205;overflow-x:hidden}
  select option{background:#0d0a1a;color:#e8d278}
  input[type=range]{-webkit-appearance:none;appearance:none;border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#ffe8a0,#c8a020);
    box-shadow:0 0 10px #c8a02088;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#ffe8a0,#c8a020);border:none;cursor:pointer}
  input[type=text]{-webkit-appearance:none}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Tax brackets ─────────────────────────────────────────────────────────────
const BRACKETS_2026 = [
  [24600,0.10],[99850,0.12],[213000,0.22],[406500,0.24],
  [516100,0.32],[774200,0.35],[Infinity,0.37]
];
const BRACKETS_2027 = [
  [25400,0.10],[103050,0.12],[220050,0.22],[420000,0.24],
  [533400,0.32],[799600,0.35],[Infinity,0.37]
];

function calcTax(taxable, brackets) {
  let tax = 0, prev = 0;
  for (const [limit, rate] of brackets) {
    if (taxable <= prev) break;
    tax += (Math.min(taxable, limit) - prev) * rate;
    prev = limit;
  }
  return tax;
}
function marginalRate(taxable, brackets) {
  let prev = 0;
  for (const [limit, rate] of brackets) {
    if (taxable <= limit) return rate;
    prev = limit;
  }
  return brackets[brackets.length - 1][1];
}
function deductionSavings(income, existingDed, newDed, brackets, bonusPct) {
  const deduction = newDed * bonusPct;
  const before = Math.max(0, income - existingDed);
  const after  = Math.max(0, before - deduction);
  const saved  = calcTax(before, brackets) - calcTax(after, brackets);
  return {
    fed: saved,
    deduction,
    netCost: newDed - saved,
    effectiveRate: deduction > 0 ? saved / deduction : 0,
  };
}

// ── Purchase types ────────────────────────────────────────────────────────────
const TYPES = [
  { id:"furniture",    label:"Furniture & Soft Furnishings",        class_:"5yr",       b26:1.00, b27:1.00, sign:"♋", desc:"Sofas, beds, dining sets, rugs, artwork — all moveable items" },
  { id:"appliances",   label:"Major Appliances",                    class_:"5yr",       b26:1.00, b27:1.00, sign:"♌", desc:"Fridge, oven, washer, dryer, dishwasher" },
  { id:"small_appl",   label:"Small Appliances & Tech",             class_:"5yr",       b26:1.00, b27:1.00, sign:"♍", desc:"Coffee machine, toaster, smart locks, AV equipment" },
  { id:"doors",        label:"Doors, Hardware & Exterior Locks",    class_:"5yr",       b26:1.00, b27:1.00, sign:"♏", desc:"Exterior/interior doors, smart locks, hardware" },
  { id:"pool",         label:"Pool & Outdoor Equipment",            class_:"15yr",      b26:1.00, b27:1.00, sign:"♒", desc:"Pump, heater, salt conversion, equipment (not structure)" },
  { id:"deck",         label:"Deck, Pergola & Outdoor Structures",  class_:"15yr",      b26:1.00, b27:1.00, sign:"♐", desc:"Deck, jacuzzi, pergola, patio cover, fencing" },
  { id:"landscape",    label:"Landscaping & Irrigation",            class_:"15yr",      b26:1.00, b27:1.00, sign:"♉", desc:"Gravel, plants, irrigation system, outdoor lighting" },
  { id:"flooring_qip", label:"New Flooring — QIP (tile, hardwood, vinyl)", class_:"15yr", b26:1.00, b27:1.00, sign:"♎", desc:"New material on rental property → QIP → 15yr → 100% bonus" },
  { id:"flooring_conc",label:"Concrete Grind & Polish (restore original)", class_:"qip_or_exp", b26:1.00, b27:1.00, sign:"☿", desc:"Likely QIP (15yr/100% bonus) OR repair expense — same deduction amount either way. Confirm with Kevin which treatment applies." },
  { id:"slider_patio", label:"Patio, Glazing & Sliders",            class_:"mixed",     b26:0.50, b27:0.50, sign:"☽", desc:"~50% exterior feature (15yr/100% bonus) + ~50% structural (39yr/20% bonus). Blended rate shown." },
  { id:"structural",   label:"Structural / Built-In Work",          class_:"39yr",      b26:0.20, b27:0.20, sign:"♑", desc:"Built-in cabinets, countertops, tile installs, laundry plumbing, additions. May 2024 purchase — OLD 20% bonus rules apply." },
  { id:"paint",        label:"Paint, Caulk & Minor Repairs",        class_:"exp",       b26:1.00, b27:1.00, sign:"☉", desc:"Maintenance & repair — deducted in full the year incurred. NOT depreciated." },
  { id:"services",     label:"Ongoing Services (annual cost)",      class_:"exp",       b26:1.00, b27:1.00, sign:"⊕", desc:"Cleaning, pool service, pest control, landscaping maintenance. Full deduction year incurred." },
  { id:"costseg",      label:"Cost Segregation Study",              class_:"2026only",  b26:1.00, b27:1.00, sign:"⭐", desc:"MUST be done in 2026. This is the prerequisite — without it, no bonus depreciation classifications exist." },
];

// ── Log slider ────────────────────────────────────────────────────────────────
const SLIDER_MIN = 0, SLIDER_MAX = 1000;
function sliderToCost(s) {
  return Math.round(Math.pow(10, 2 + (s / 1000) * 3) / 50) * 50;
}
function costToSlider(c) {
  return Math.round(((Math.log10(Math.max(c,100)) - 2) / 3) * 1000);
}

// ── Stars ─────────────────────────────────────────────────────────────────────
const STARS = Array.from({length:55},(_,i)=>({
  id:i, x:Math.random()*100, y:Math.random()*100,
  r:Math.random()*1.6+0.4, op:Math.random()*0.45+0.15,
  dur:Math.random()*4+2, del:Math.random()*3
}));
function Stars() {
  return (
    <svg style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}}>
      {STARS.map(s=>(
        <circle key={s.id} cx={s.x+"%"} cy={s.y+"%"} r={s.r} fill="#e8d278" opacity={s.op}>
          <animate attributeName="opacity"
            values={s.op+";"+s.op*0.25+";"+s.op}
            dur={s.dur+"s"} begin={s.del+"s"} repeatCount="indefinite"/>
        </circle>
      ))}
    </svg>
  );
}

// ── Money input ───────────────────────────────────────────────────────────────
function MoneyInput({label, sub, value, onChange, color}) {
  const [raw, setRaw] = useState(value.toLocaleString());
  useEffect(()=>{ setRaw(value.toLocaleString()); },[value]);
  return (
    <div>
      <div style={{fontFamily:"'Courier New',monospace",fontSize:8,letterSpacing:"2.5px",
        color:color,textTransform:"uppercase",marginBottom:3}}>{label}</div>
      {sub && <div style={{fontFamily:"Georgia,serif",fontSize:10,color:"#555",
        fontStyle:"italic",marginBottom:4}}>{sub}</div>}
      <div style={{display:"flex",alignItems:"center",gap:4,
        background:"#0d0a1a",border:"1px solid "+color+"44",borderRadius:5,padding:"7px 10px"}}>
        <span style={{fontFamily:"'Courier New',monospace",fontSize:12,color:color}}>$</span>
        <input type="text" value={raw}
          onChange={e=>{
            const v = e.target.value.replace(/[^0-9]/g,"");
            const n = parseInt(v);
            setRaw(v === "" ? "" : isNaN(n) ? raw : n.toLocaleString());
            if(!isNaN(n) && n > 0) onChange(n);
          }}
          style={{flex:1,background:"transparent",border:"none",outline:"none",
            fontFamily:"'Palatino Linotype',Palatino,serif",fontSize:16,
            color:"#e8d278",textAlign:"right",minWidth:0,width:"100%"}}/>
      </div>
    </div>
  );
}

// ── Bracket chip ──────────────────────────────────────────────────────────────
function BracketChip({taxable, brackets, label}) {
  const rate = marginalRate(taxable, brackets);
  const c = rate<=0.22?"#7de8a0":rate<=0.24?"#c8d060":rate<=0.32?"#e8c040":rate<=0.35?"#e8a040":"#e84060";
  return (
    <div style={{display:"flex",alignItems:"center",gap:5,flex:1,
      background:"#ffffff07",borderRadius:4,padding:"5px 8px"}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:c,flexShrink:0}}/>
      <span style={{fontFamily:"'Courier New',monospace",fontSize:8,color:"#666",letterSpacing:"1px"}}>{label}: </span>
      <span style={{fontFamily:"'Courier New',monospace",fontSize:10,color:c,fontWeight:"bold"}}>{(rate*100).toFixed(0)}%</span>
      <span style={{fontFamily:"'Courier New',monospace",fontSize:8,color:"#444",letterSpacing:"1px"}}>
        · taxable ${taxable.toLocaleString()}
      </span>
    </div>
  );
}

// ── Year card ─────────────────────────────────────────────────────────────────
function YearCard({yearLabel, result, isBetter, cost, is2026only}) {
  const accentColor = isBetter ? "#5cb87a" : "#5a4a8a";
  const textColor   = isBetter ? "#7de8a0" : "#c8b8e8";
  return (
    <div style={{flex:1,background:isBetter?"#0a1408":"#0a0818",
      border:"1px solid "+(isBetter?"#5cb87a55":"#5a4a8a44"),
      borderTop:"3px solid "+accentColor,
      borderRadius:6,padding:"14px 12px",position:"relative"}}>
      {isBetter && (
        <div style={{position:"absolute",top:8,right:8,
          fontFamily:"'Courier New',monospace",fontSize:7,letterSpacing:"2px",
          color:"#5cb87a",background:"#0a2010",border:"1px solid #5cb87a44",
          borderRadius:3,padding:"2px 6px"}}>◉ FAVOURED</div>
      )}
      <div style={{fontFamily:"'Palatino Linotype',Palatino,serif",fontSize:18,
        color:textColor,marginBottom:10}}>{yearLabel}</div>

      {is2026only && yearLabel!=="2026" ? (
        <div style={{fontFamily:"Georgia,serif",fontSize:11,color:"#4a3a2a",
          fontStyle:"italic",lineHeight:1.6,padding:"6px 0"}}>
          Must be completed in 2026 only — prerequisite for all depreciation
        </div>
      ) : (
        <>
          {[
            ["deduction","$"+result.deduction.toLocaleString(undefined,{maximumFractionDigits:0}),"#e8d8a0"],
            ["tax saved","$"+result.fed.toLocaleString(undefined,{maximumFractionDigits:0}),textColor],
            ["net cost","$"+result.netCost.toLocaleString(undefined,{maximumFractionDigits:0}),isBetter?"#a0ffc0":"#d8ccf0"],
          ].map(([lbl,val,col])=>(
            <div key={lbl} style={{borderBottom:"1px solid #ffffff08",paddingBottom:8,marginBottom:8}}>
              <div style={{fontFamily:"'Courier New',monospace",fontSize:7,color:"#444",
                letterSpacing:"2px",textTransform:"uppercase",marginBottom:2}}>{lbl}</div>
              <div style={{fontFamily:"'Palatino Linotype',Palatino,serif",
                fontSize:lbl==="net cost"?22:18,color:col}}>
                {val}
              </div>
              {lbl==="net cost" && (
                <div style={{fontFamily:"'Courier New',monospace",fontSize:8,color:"#333"}}>
                  of ${cost.toLocaleString()} spent
                </div>
              )}
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ── Decision framework ────────────────────────────────────────────────────────
function Verdict({r26, r27, cost, type, income26, ded26, income27, ded27}) {
  if (!type || cost <= 0) return null;

  const taxable26 = Math.max(0, income26 - ded26);
  const taxable27 = Math.max(0, income27 - ded27);
  const mRate26 = marginalRate(taxable26, BRACKETS_2026);
  const mRate27 = marginalRate(taxable27, BRACKETS_2027);

  const diff = r27.fed - r26.fed;
  const timeAdj26 = r26.fed * 1.05;
  const netAdv27 = r27.fed - timeAdj26;
  const pctAdv = r26.fed > 0 ? (netAdv27 / r26.fed) * 100 : (r27.fed > 0 ? 100 : 0);

  let verdict, color, icon;
  if (type.class_ === "2026only") {
    verdict = "This is a 2026 prerequisite — no choice here. Complete the cost segregation study before Dec 31, 2026. Without it, none of the deductions below apply.";
    color = "#e8d278"; icon = "⭐";
  } else if (type.class_ === "exp") {
    const extra = (cost * (mRate27 - mRate26)).toLocaleString(undefined,{maximumFractionDigits:0});
    verdict = `Operating expenses are always better in 2027 — same 100% deduction but at ${(mRate27*100).toFixed(0)}% vs ${(mRate26*100).toFixed(0)}% this year. That's an extra $${extra} federal savings. Defer unless you need the cash flow from the 2026 refund.`;
    color = "#e8a84a"; icon = "◇";
  } else if (pctAdv > 30) {
    verdict = `2027 is meaningfully better. The bracket gap — ${(mRate26*100).toFixed(0)}% this year vs ${(mRate27*100).toFixed(0)}% in 2027 — is large enough that even after 5% time value of money, you save ${pctAdv.toFixed(0)}% more by waiting. Defer this purchase if cash flow allows.`;
    color = "#e8a84a"; icon = "◇";
  } else if (pctAdv > 10) {
    verdict = `2027 has a moderate edge (${pctAdv.toFixed(0)}% better after time value). The higher IPO marginal rate wins on paper. Buy in 2027 unless this item is needed to establish your Dec 2026 in-service date, or you need the refund for the second property.`;
    color = "#e8c040"; icon = "◈";
  } else if (pctAdv > 0) {
    verdict = `Near wash — 2027 is barely better (${pctAdv.toFixed(0)}% after time value). Buy based on operational need. If the property needs it to be rentable by Dec 2026, buy now.`;
    color = "#c8d060"; icon = "◈";
  } else {
    verdict = `2026 is favoured — the time value of getting your refund a year earlier outweighs the small rate difference. Buy now if needed.`;
    color = "#7de8a0"; icon = "✦";
  }

  return (
    <div style={{marginTop:12,padding:"16px 18px",background:"#08090e",
      border:"1px solid "+color+"33",borderLeft:"3px solid "+color,borderRadius:6}}>

      <div style={{fontFamily:"'Palatino Linotype',Palatino,serif",
        fontSize:13,color:color,marginBottom:8}}>{icon} The Stars Counsel</div>
      <div style={{fontFamily:"Georgia,serif",fontSize:12,color:"#b0a080",
        lineHeight:1.75,marginBottom:14}}>{verdict}</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[
          ["Rate gap",`${(mRate26*100).toFixed(0)}% → ${(mRate27*100).toFixed(0)}%`,"#b8a8e0"],
          ["2026 refund × 1.05","$"+timeAdj26.toLocaleString(undefined,{maximumFractionDigits:0}),"#e8d278"],
          ["Net 2027 advantage",(pctAdv>0?"+":"")+pctAdv.toFixed(0)+"%",pctAdv>10?"#e8a040":pctAdv>0?"#e8d278":"#7de8a0"],
        ].map(([lbl,val,col])=>(
          <div key={lbl} style={{background:"#ffffff06",borderRadius:4,padding:"7px 10px"}}>
            <div style={{fontFamily:"'Courier New',monospace",fontSize:7,color:"#444",
              letterSpacing:"2px",textTransform:"uppercase",marginBottom:3,lineHeight:1.4}}>{lbl}</div>
            <div style={{fontFamily:"'Palatino Linotype',Palatino,serif",fontSize:14,color:col}}>{val}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{background:"#0a1408",border:"1px solid #2a5a2a33",borderRadius:4,padding:"8px 12px"}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:7,color:"#3a7a50",
            letterSpacing:"2px",textTransform:"uppercase",marginBottom:4}}>✦ Buy in 2026 when</div>
          <div style={{fontFamily:"Georgia,serif",fontSize:10.5,color:"#6a8a6a",lineHeight:1.65}}>
            Property needs it to be rentable by Dec 31 · Need April 2027 refund for 2nd property down payment · Item establishes in-service date · REPS needs active rental evidence
          </div>
        </div>
        <div style={{background:"#100a08",border:"1px solid #5a2a1a33",borderRadius:4,padding:"8px 12px"}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:7,color:"#7a4030",
            letterSpacing:"2px",textTransform:"uppercase",marginBottom:4}}>◇ Defer to 2027 when</div>
          <div style={{fontFamily:"Georgia,serif",fontSize:10.5,color:"#8a6a5a",lineHeight:1.65}}>
            Cash flow not urgent · Item not needed for Dec 2026 in-service · Want to maximise savings against IPO income · All services and ongoing costs
          </div>
        </div>
      </div>

      {type.class_ !== "exp" && type.class_ !== "2026only" && (
        <div style={{padding:"8px 12px",background:"#ffffff05",borderRadius:4,
          display:"flex",gap:8,alignItems:"flex-start"}}>
          <span style={{color:"#e8a840",fontSize:13,flexShrink:0}}>⚡</span>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:8,color:"#6a5030",
            letterSpacing:"1px",lineHeight:1.6}}>
            REPS NOTE: Without REPS in 2026, rental losses are passive and carry forward — not lost, just deferred to 2027 STR income. 2027 purchases always apply against confirmed rental income regardless of REPS status.
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main app ──────────────────────────────────────────────────────────────────
function App() {
  const [typeId, setTypeId]     = useState("furniture");
  const [sliderPos, setSlider]  = useState(costToSlider(4000));
  const [cost, setCost]         = useState(4000);
  const [costInput, setCostInp] = useState("4,000");
  const [income26, setIncome26] = useState(334000);
  const [ded26, setDed26]       = useState(200000);
  const [income27, setIncome27] = useState(800000);
  const [ded27, setDed27]       = useState(165000);
  const [showConfig, setConfig] = useState(false);

  const type = TYPES.find(t=>t.id===typeId);
  const taxable26 = Math.max(0, income26 - ded26);
  const taxable27 = Math.max(0, income27 - ded27);
  const r26 = deductionSavings(income26, ded26, cost, BRACKETS_2026, type ? type.b26 : 1);
  const r27 = deductionSavings(income27, ded27, cost, BRACKETS_2027, type ? type.b27 : 1);

  const better = (() => {
    if (!type || type.class_ === "2026only") return "2026";
    if (type.class_ === "exp") return "2027";
    return (r27.fed > r26.fed * 1.05) ? "2027" : "2026";
  })();

  const handleSlider = e => {
    const pos = parseInt(e.target.value);
    setSlider(pos);
    const c = sliderToCost(pos);
    setCost(c);
    setCostInp(c.toLocaleString());
  };

  const handleCostText = val => {
    const n = parseInt(val.replace(/,/g,"").replace(/[^0-9]/g,""));
    if (!isNaN(n) && n >= 50) {
      setCost(n);
      setSlider(costToSlider(Math.min(n, 100000)));
    }
  };

  const sliderBg = `linear-gradient(90deg,#c8b560 ${sliderPos/10}%,#2a1a4a ${sliderPos/10}%)`;

  return (
    <div style={{minHeight:"100vh",
      background:"radial-gradient(ellipse at 20% 10%,#180a2e 0%,#080410 40%,#000205 70%,#000)",
      color:"#e8e0d0",fontFamily:"Georgia,'Palatino Linotype',serif",
      position:"relative",overflow:"hidden"}}>
      <Stars/>
      <div style={{position:"fixed",top:"-15%",left:"50%",transform:"translateX(-50%)",
        width:500,height:250,
        background:"radial-gradient(ellipse,#2a0a4a18,transparent 70%)",
        pointerEvents:"none",zIndex:0}}/>

      <div style={{position:"relative",zIndex:1,maxWidth:640,margin:"0 auto",
        padding:"32px 18px 60px"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:8,letterSpacing:"5px",
            color:"#6a5a9a",textTransform:"uppercase",marginBottom:10}}>
            ✦ Palm Springs Property · Celestial Tax Counsel ✦
          </div>
          <h1 style={{fontFamily:"'Palatino Linotype',Palatino,serif",fontSize:30,
            fontWeight:400,letterSpacing:"2px",color:"#e8d278",
            margin:"0 0 4px",textShadow:"0 0 40px #c8a02088",lineHeight:1.2}}>
            REPs, My Little Babies
          </h1>
          <div style={{fontFamily:"Georgia,serif",fontSize:12,color:"#8a7a6a",
            fontStyle:"italic",marginBottom:5}}>channelling the witch herself</div>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:8,letterSpacing:"3px",
            color:"#4a3a6a",textTransform:"uppercase"}}>
            when should you spend · what will the stars return
          </div>
        </div>

        {/* Income config toggle */}
        <div style={{marginBottom:20}}>
          <button onClick={()=>setConfig(!showConfig)} style={{
            width:"100%",padding:"10px 16px",background:"#0d0a18",
            border:"1px solid #2a1a4a",borderRadius:6,
            color:"#8878b8",fontFamily:"'Courier New',monospace",
            fontSize:9,letterSpacing:"2.5px",textTransform:"uppercase",
            cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>✦ Income &amp; Deduction Configuration</span>
            <span style={{fontSize:12,transition:"transform 0.2s",
              transform:showConfig?"rotate(180deg)":"none"}}>▾</span>
          </button>

          {showConfig && (
            <div style={{background:"#0a0818",border:"1px solid #2a1a4a",
              borderTop:"none",borderRadius:"0 0 6px 6px",padding:"16px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:12}}>
                <div>
                  <div style={{fontFamily:"'Courier New',monospace",fontSize:8,color:"#c8b560",
                    letterSpacing:"2px",textTransform:"uppercase",
                    marginBottom:8,paddingBottom:4,borderBottom:"1px solid #2a1a3a"}}>2026</div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <MoneyInput label="Gross Income" value={income26} onChange={setIncome26}
                      color="#c8b560" sub="W2 + secondary sale"/>
                    <MoneyInput label="Other Deductions" value={ded26} onChange={setDed26}
                      color="#8878b8" sub="Mortgage interest + committed reno items"/>
                  </div>
                </div>
                <div>
                  <div style={{fontFamily:"'Courier New',monospace",fontSize:8,color:"#7de8a0",
                    letterSpacing:"2px",textTransform:"uppercase",
                    marginBottom:8,paddingBottom:4,borderBottom:"1px solid #1a2a1a"}}>2027</div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <MoneyInput label="Gross Income" value={income27} onChange={setIncome27}
                      color="#7de8a0" sub="W2 + IPO equity income"/>
                    <MoneyInput label="Other Deductions" value={ded27} onChange={setDed27}
                      color="#8878b8" sub="Mortgage + PS straight-line + 2nd prop"/>
                  </div>
                </div>
              </div>
              <div style={{fontFamily:"'Courier New',monospace",fontSize:8,color:"#3a3030",
                letterSpacing:"1px",textAlign:"center"}}>
                These deductions exclude the item being evaluated above
              </div>
            </div>
          )}

          {/* Always-visible bracket chips */}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <BracketChip taxable={taxable26} brackets={BRACKETS_2026} label="2026 rate"/>
            <BracketChip taxable={taxable27} brackets={BRACKETS_2027} label="2027 rate"/>
          </div>
        </div>

        {/* Purchase type */}
        <div style={{marginBottom:18}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:8,letterSpacing:"3px",
            color:"#7a6abc",textTransform:"uppercase",marginBottom:6}}>✦ what are you buying?</div>
          <div style={{position:"relative"}}>
            <select value={typeId} onChange={e=>setTypeId(e.target.value)} style={{
              width:"100%",padding:"12px 40px 12px 16px",background:"#0d0a1a",
              border:"1px solid #3a2a6a",borderRadius:6,color:"#e8d278",
              fontFamily:"'Palatino Linotype',Palatino,serif",fontSize:14,
              cursor:"pointer",outline:"none",appearance:"none",WebkitAppearance:"none",
              boxShadow:"0 0 20px #3a2a6a22"}}>
              {TYPES.map(t=>(
                <option key={t.id} value={t.id}>{t.sign}  {t.label}</option>
              ))}
            </select>
            <div style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",
              color:"#7a6abc",pointerEvents:"none",fontSize:13}}>▾</div>
          </div>
          {type && (
            <div style={{fontFamily:"Georgia,serif",fontSize:10.5,color:"#5a4a6a",
              fontStyle:"italic",marginTop:5,paddingLeft:2,lineHeight:1.5}}>
              {type.sign} {type.desc}
              {" · "}
              {type.b26 !== 1 || type.b27 !== 1
                ? "Bonus: "+(type.b26*100).toFixed(0)+"% (2026) / "+(type.b27*100).toFixed(0)+"% (2027)"
                : "100% bonus both years"
              }
            </div>
          )}
        </div>

        {/* Cost slider */}
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",
            alignItems:"center",marginBottom:8}}>
            <div style={{fontFamily:"'Courier New',monospace",fontSize:8,letterSpacing:"3px",
              color:"#7a6abc",textTransform:"uppercase"}}>✦ the sum in question</div>
            <div style={{display:"flex",alignItems:"center",gap:4,
              background:"#0d0a1a",border:"1px solid #3a2a6a",borderRadius:5,padding:"5px 10px"}}>
              <span style={{fontFamily:"'Courier New',monospace",fontSize:12,color:"#7a6abc"}}>$</span>
              <input type="text" value={costInput}
                onChange={e=>{
                  const raw = e.target.value.replace(/[^0-9]/g,"");
                  const n = parseInt(raw);
                  setCostInp(raw ? n.toLocaleString() : "");
                  handleCostText(raw);
                }}
                style={{width:85,background:"transparent",border:"none",outline:"none",
                  fontFamily:"'Palatino Linotype',Palatino,serif",fontSize:16,
                  color:"#e8d278",textAlign:"right"}}/>
            </div>
          </div>
          <input type="range" min={SLIDER_MIN} max={SLIDER_MAX} step={1}
            value={sliderPos} onChange={handleSlider}
            style={{width:"100%",height:5,cursor:"pointer",background:sliderBg,
              borderRadius:3,outline:"none"}}/>
          <div style={{display:"flex",justifyContent:"space-between",
            fontFamily:"'Courier New',monospace",fontSize:8,color:"#3a2a5a",marginTop:4}}>
            {["$100","$300","$1K","$3K","$10K","$30K","$100K"].map(l=>(
              <span key={l}>{l}</span>
            ))}
          </div>
        </div>

        {/* Side-by-side year cards */}
        <div style={{display:"flex",gap:10,marginBottom:0}}>
          <YearCard yearLabel="2026" result={r26} isBetter={better==="2026"}
            cost={cost} is2026only={type && type.class_==="2026only"}/>
          <YearCard yearLabel="2027" result={r27} isBetter={better==="2027"}
            cost={cost} is2026only={type && type.class_==="2026only"}/>
        </div>

        {/* Verdict */}
        <Verdict r26={r26} r27={r27} cost={cost} type={type}
          income26={income26} ded26={ded26}
          income27={income27} ded27={ded27}/>

        {/* Footer prerequisites */}
        <div style={{marginTop:36,paddingTop:18,borderTop:"1px solid #1a0a2a44"}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:8,letterSpacing:"2px",
            color:"#8a7840",textTransform:"uppercase",marginBottom:10}}>
            ✦ Prerequisites for these numbers to hold
          </div>
          {[
            ["⭐ Cost Segregation Study (2026 — mandatory first step)",
             "Must be completed before Dec 31, 2026. Without this, none of the bonus depreciation classifications exist. Cost ~$4–6K, itself fully deductible as a business expense."],
            ["◎ Real Estate Professional Status (REPS)",
             "Jessi must document 750+ hours AND majority-of-work-time in real estate in 2026. Without REPS, 2026 losses are passive and carry forward to 2027 STR income — not lost, just deferred."],
            ["◎ Property In-Service by Dec 31, 2026",
             "Must be listed, furnished, and available for rental before year-end. A 29+ day listing on Airbnb (no bookings required) qualifies. This triggers the 2026 depreciation year."],
            ["◎ New Items Acquired After Jan 19, 2025",
             "100% OBBBA bonus depreciation only applies post-Jan 19, 2025. Your original building (May 2024) uses old 20% bonus rules — reflected in 'Structural / Built-In' category above."],
            ["◎ Residential Solar ITC — Expired Dec 31, 2025",
             "The 25D credit is gone. No federal credit on homeowner-purchased solar in 2026. Ask Kevin about Section 48 commercial ITC if solar is installed on the rental property via Kokomo LLC."],
            ["◎ OBBBA 100% Bonus Depreciation — Permanent",
             "Signed July 4, 2025. Applies equally to 2026 and 2027. No phase-out timing pressure — rate is the same both years for qualifying new items."],
          ].map(([title,body])=>(
            <div key={title} style={{display:"flex",gap:8,marginBottom:8,
              paddingBottom:8,borderBottom:"1px solid #1a0a2a22"}}>
              <div style={{fontFamily:"'Courier New',monospace",fontSize:10,
                color:"#5a4a2a",marginTop:1,flexShrink:0,lineHeight:1.4}}></div>
              <div>
                <div style={{fontFamily:"'Courier New',monospace",fontSize:8,
                  color:"#6a5a3a",letterSpacing:"1px",marginBottom:2}}>{title}</div>
                <div style={{fontFamily:"Georgia,serif",fontSize:11,color:"#3a3028",lineHeight:1.5}}>{body}</div>
              </div>
            </div>
          ))}
          <div style={{fontFamily:"'Courier New',monospace",fontSize:8,
            color:"#2a2020",letterSpacing:"2px",textAlign:"center",marginTop:10,lineHeight:2}}>
            Not financial advice. The stars cannot be held liable.<br/>
            Confirm all strategies with Kevin at Bean Counters before executing.
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
