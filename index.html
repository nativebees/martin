<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculator</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .calculator { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; }
        .calculator input { width: 100%; padding: 10px; margin: 10px 0; }
        .calculator button { padding: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        class TaxCalculator extends React.Component {
            constructor(props) {
                super(props);
                this.state = { income: '', taxRate: '', tax: 0 };
            }

            calculateTax = () => {
                const { income, taxRate } = this.state;
                const tax = income * (taxRate / 100);
                this.setState({ tax });
            };

            handleInputChange = (event) => {
                this.setState({ [event.target.name]: event.target.value });
            };

            render() {
                return (
                    <div className="calculator">
                        <h2>Tax Calculator</h2>
                        <input 
                            type="number" 
                            name="income" 
                            placeholder="Enter your income" 
                            value={this.state.income} 
                            onChange={this.handleInputChange} 
                        />
                        <input 
                            type="number" 
                            name="taxRate" 
                            placeholder="Enter tax rate (%)" 
                            value={this.state.taxRate} 
                            onChange={this.handleInputChange} 
                        />
                        <button onClick={this.calculateTax}>Calculate Tax</button>
                        <h3>Total Tax: ${this.state.tax.toFixed(2)}</h3>
                    </div>
                );
            }
        }

        ReactDOM.render(<TaxCalculator />, document.getElementById('root'));
    </script>
</body>
</html>
